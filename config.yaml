# DNSSEC Domain Registry — Personal testing configuration
#
# Registrar: GoDaddy (personal account)
# Provider:  Cloudflare only (azure: false — Azure DNS removed)
#
# Required environment variables:
#   CLOUDFLARE_API_TOKEN  — API token from dash.cloudflare.com/profile/api-tokens
#   GODADDY_API_KEY       — API key from developer.godaddy.com/keys
#   GODADDY_API_SECRET    — API secret from developer.godaddy.com/keys
#   GODADDY_CUSTOMER_ID   — Your customer number from the GoDaddy portal
#                           (Account Settings → Customer Number)

domains:
  ttgfriends.in:
    azure: false
