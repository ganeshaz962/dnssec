name: DNSSEC Onboard

on:
  push:
    paths:
      - 'dnssec/config.yaml'
    branches:
      - main
      - 'feature/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (preview only)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  dry-run:
    name: Dry-run Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          errors=0
          for secret_name in CLOUDFLARE_API_TOKEN CSC_API_KEY CSC_BEARER_TOKEN; do
            eval "val=\${$secret_name}"
            if [ -z "$val" ]; then
              echo "Error: $secret_name secret is not set"
              errors=1
            fi
          done
          [ $errors -eq 0 ] || exit 1
          echo "Secrets validated successfully"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_DNS_API_TOKEN }}
          CSC_API_KEY: ${{ secrets.CSC_API_KEY }}
          CSC_BEARER_TOKEN: ${{ secrets.CSC_BEARER_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'dnssec/requirements.txt'

      - name: Install dependencies
        run: pip install -r dnssec/requirements.txt

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          allow-no-subscriptions: true
          creds: |
            {
              "clientId": "${{ secrets.CDX_ADMIN_CLIENT_ID }}",
              "clientSecret": "${{ secrets.CDX_ADMIN_CLIENT_SECRET }}",
              "tenantId": "5581c9a8-168b-45f0-abd4-d375da99bf9f",
              "subscriptionId": ""
            }

      - name: Dry-run preview
        run: |
          cd dnssec
          python onboard_domains.py --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_DNS_API_TOKEN }}
          CSC_API_KEY: ${{ secrets.CSC_API_KEY }}
          CSC_BEARER_TOKEN: ${{ secrets.CSC_BEARER_TOKEN }}

  onboard:
    name: Onboard Domains
    runs-on: ubuntu-latest
    needs: dry-run
    environment: requires_approval
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'dnssec/requirements.txt'

      - name: Install dependencies
        run: pip install -r dnssec/requirements.txt

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          allow-no-subscriptions: true
          creds: |
            {
              "clientId": "${{ secrets.CDX_ADMIN_CLIENT_ID }}",
              "clientSecret": "${{ secrets.CDX_ADMIN_CLIENT_SECRET }}",
              "tenantId": "5581c9a8-168b-45f0-abd4-d375da99bf9f",
              "subscriptionId": ""
            }

      - name: Onboard domains
        run: |
          cd dnssec
          python onboard_domains.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_DNS_API_TOKEN }}
          CSC_API_KEY: ${{ secrets.CSC_API_KEY }}
          CSC_BEARER_TOKEN: ${{ secrets.CSC_BEARER_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_CLOUDFLARE_NOTIFICATION }}
