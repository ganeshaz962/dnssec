name: DNSSEC Onboard

# Enables DNSSEC on Cloudflare + Azure DNS and registers DS records at GoDaddy.
#
# Two-job flow:
#
#   dry-run   (automatic on every push to config.yaml or manual trigger)
#     Validates Cloudflare zone, Azure subscription/RG exist.
#     No changes made.
#
#   onboard   (requires approval — environment: dnssec-onboard-approve)
#     Enables DNSSEC on Cloudflare + Azure.
#     Extracts DS records from both.
#     Adds DS records to GoDaddy.
#     Validates with dig.
#
# Triggers:
#   - Push to main that modifies config.yaml
#   - Manually via Actions UI

on:
  push:
    paths:
      - 'config.yaml'
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (preview, no changes)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  dry-run:
    name: Dry-run Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Dry-run preview
        run: python onboard_domains.py --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GODADDY_API_KEY: ${{ secrets.GODADDY_API_KEY }}
          GODADDY_API_SECRET: ${{ secrets.GODADDY_API_SECRET }}
          GODADDY_CUSTOMER_ID: ${{ secrets.GODADDY_CUSTOMER_ID }}


  onboard:
    name: Onboard Domains
    runs-on: ubuntu-latest
    needs: dry-run
    # Approval gate — pauses until a reviewer approves in GitHub Actions UI.
    # Configure reviewers at: Repo Settings → Environments → dnssec-onboard-approve
    environment: dnssec-onboard-approve
    if: |
      github.ref == 'refs/heads/main' && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Onboard domains
        run: python onboard_domains.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GODADDY_API_KEY: ${{ secrets.GODADDY_API_KEY }}
          GODADDY_API_SECRET: ${{ secrets.GODADDY_API_SECRET }}
          GODADDY_CUSTOMER_ID: ${{ secrets.GODADDY_CUSTOMER_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
